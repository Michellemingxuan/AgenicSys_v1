table: model_scores
description: "Internal model outputs — one row per model per scoring run"
row_count: 100
one_row_per_case: false

columns:
  case_id:
    dtype: string
    format: "CASE-{seq:05d}"
    description: "Foreign key to case"

  model_id:
    dtype: categorical
    categories:
      risk_v3: 0.40
      propensity_v2: 0.30
      collections_v1: 0.30
    description: "Model identifier — which internal model produced this score"

  score:
    dtype: float
    distribution: normal
    mean: 0.45                   # TUNE: average risk probability across cases
    std: 0.2                     # TUNE: spread of risk scores
    min: 0.0
    max: 1.0
    description: "Raw model score (probability of event, 0-1)"

  percentile:
    dtype: int
    distribution: uniform
    min: 1
    max: 100
    description: "Population percentile rank (1=lowest risk, 100=highest risk)"

  timestamp:
    dtype: date
    year: 2024
    description: "Date when scoring run was executed"

correlations:
  - columns: [score, percentile]
    direction: positive
    strength: 0.8
